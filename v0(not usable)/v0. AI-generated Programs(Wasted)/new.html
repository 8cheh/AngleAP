<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Droplet Analyzer V4 (Stable)</title>
<script async src="https://docs.opencv.org/4.x/opencv.js"></script>

<style>
body { background:#111; color:#eee; font-family:Arial; }
canvas { border:1px solid #444; margin:10px; }
</style>
</head>

<body>

<h3>Droplet Contact Angle V4 (Stable)</h3>

<input type="file" id="upload">
<button onclick="run()">RUN</button>

<p id="info"></p>

<canvas id="c1"></canvas>
<canvas id="c2"></canvas>

<script>

let src = null;
let cvReady = false;

cv['onRuntimeInitialized'] = () => {
    cvReady = true;
};


document.getElementById('upload').onchange = function(e){

    let img = new Image();
    img.src = URL.createObjectURL(e.target.files[0]);

    img.onload = function(){

        let c = document.getElementById("c1");
        c.width = img.width;
        c.height = img.height;

        let ctx = c.getContext("2d");
        ctx.drawImage(img,0,0);

        setTimeout(() => {
            src = cv.imread(c);
        }, 50);
    };
};


// =====================
// RUN PIPELINE
// =====================
function run(){

    if(!cvReady){
        alert("OpenCV not ready");
        return;
    }

    if(!src || src.empty()){
        alert("Please upload image first");
        return;
    }

    // =====================
    // 1. preprocess
    // =====================
    let gray = new cv.Mat();
    cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
    cv.GaussianBlur(gray, gray, new cv.Size(5,5), 1.2);

    let bin = new cv.Mat();
    cv.threshold(gray, bin, 0, 255, cv.THRESH_BINARY + cv.THRESH_OTSU);

    // =====================
    // 2. contour extraction (核心稳定点)
    // =====================
    let contours = new cv.MatVector();
    let hierarchy = new cv.Mat();

    cv.findContours(bin, contours, hierarchy,
        cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

    if(contours.size() == 0){
        document.getElementById("info").innerText = "No contour found";
        return;
    }

    // 最大轮廓 = 液滴
    let maxIdx = 0;
    let maxArea = 0;

    for(let i=0;i<contours.size();i++){
        let c = contours.get(i);
        let area = cv.contourArea(c);
        if(area > maxArea){
            maxArea = area;
            maxIdx = i;
        }
    }

    let cnt = contours.get(maxIdx);

    // =====================
    // 3. convert to points
    // =====================
    let pts = [];
    for(let i=0;i<cnt.rows;i++){
        pts.push({
            x: cnt.data32S[i*2],
            y: cnt.data32S[i*2+1]
        });
    }

    // =====================
    // 4. baseline (稳定统计法)
    // =====================
    let ys = pts.map(p=>p.y).sort((a,b)=>a-b);

    let baseline = ys[Math.floor(ys.length * 0.90)];

    let valid = pts.filter(p => p.y < baseline);

    // =====================
    // 5. tip detection
    // =====================
    let tip = valid.reduce((a,b)=> a.y < b.y ? a : b);

    // =====================
    // 6. split left/right
    // =====================
    let left = valid.filter(p => p.x < tip.x);
    let right = valid.filter(p => p.x > tip.x);

    function fitAngle(side){

        if(side.length < 5) return 90;

        // 取靠近 tip 的点（关键稳定点）
        let sorted = side.sort((a,b)=> b.y - a.y).slice(0,10);

        let dx = sorted[sorted.length-1].x - sorted[0].x;
        let dy = baseline - tip.y;

        if(dx === 0) return 90;

        let angle = Math.atan2(dy, Math.abs(dx)) * 180/Math.PI;
        return angle;
    }

    let angL = fitAngle(left);
    let angR = fitAngle(right);

    let angle = (angL + angR)/2;

    document.getElementById("info").innerText =
        "Contact Angle ≈ " + angle.toFixed(2) + "°";

    // =====================
    // 7. visualize
    // =====================
    let c2 = document.getElementById("c2");
    c2.width = src.cols;
    c2.height = src.rows;

    let ctx = c2.getContext("2d");
    let img = new ImageData(src.cols, src.rows);

    for(let i=0;i<src.data.length;i++){
        img.data[i] = src.data[i];
    }

    ctx.putImageData(img,0,0);

    // contour
    ctx.strokeStyle = "red";
    ctx.beginPath();
    pts.forEach(p => ctx.lineTo(p.x,p.y));
    ctx.stroke();

    // baseline
    ctx.strokeStyle = "yellow";
    ctx.beginPath();
    ctx.moveTo(0,baseline);
    ctx.lineTo(src.cols,baseline);
    ctx.stroke();
}

</script>

</body>
</html>
